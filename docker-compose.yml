services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test1-backend
    volumes:
      - ./data:/app/data
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
  db:
    image: postgres:15-alpine
    container_name: test1-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: class_register
      POSTGRES_PASSWORD: postgress
      POSTGRES_USER: user
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  db_data: